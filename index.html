<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FinScope v0.7</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top right,#24534c,#0b2230 45%,#08131d);color:white;min-height:100vh} .wrap{max-width:1080px;margin:0 auto;padding:42px 22px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.title{font-size:34px;font-weight:800;margin:0}.sub{margin:8px 0 0;opacity:.9}.btn{background:#84d7ff;color:white;border:0;border-radius:14px;padding:13px 22px;font-weight:800;box-shadow:0 10px 30px #0004;cursor:pointer}.meta{text-align:right;font-size:13px;line-height:1.7}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:30px}.card{min-height:145px;border:1px solid rgba(255,255,255,.26);background:rgba(255,255,255,.09);border-radius:18px;padding:18px;box-shadow:0 16px 40px rgba(0,0,0,.18);cursor:pointer;transition:.15s}.card:hover{transform:translateY(-2px);border-color:#9de4ff}.name{font-size:14px;font-weight:800;opacity:.95}.value{font-size:31px;font-weight:900;margin-top:18px}.chg{font-size:14px;font-weight:800;margin-top:8px}.pos{color:#86f5bd}.neg{color:#ff8d9a}.muted{color:#b9c8cf}.source{font-size:12px;margin-top:10px;opacity:.8}.spark{height:34px;margin-top:14px;border-radius:10px;background:linear-gradient(135deg,rgba(141,236,255,.15),rgba(157,255,176,.12));position:relative;overflow:hidden}.spark:after{content:"";position:absolute;left:10px;right:10px;bottom:9px;height:4px;background:linear-gradient(90deg,#b7f5ff,#9cffba);border-radius:99px;transform:skewY(-7deg)}.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px}.panel{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);border-radius:18px;padding:20px;line-height:1.55}.panel h2{margin:0 0 10px;font-size:21px}.chips span{display:inline-block;border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:7px 10px;margin:8px 6px 0 0;font-size:12px;font-weight:800}.modalBack{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:22px}.modal{width:min(720px,96vw);border-radius:22px;background:linear-gradient(160deg,#17384a,#102331);border:1px solid rgba(255,255,255,.28);box-shadow:0 30px 80px #0009;padding:26px}.modalTop{display:flex;justify-content:space-between;gap:16px}.close{background:transparent;color:white;border:1px solid rgba(255,255,255,.35);border-radius:10px;padding:8px 12px;cursor:pointer}.detailGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}.box{background:rgba(255,255,255,.07);border-radius:14px;padding:14px}.box small{display:block;opacity:.7;margin-bottom:6px}.warn{margin-top:20px;color:#ffe6a8;font-size:14px}@media(max-width:760px){.grid,.panels,.detailGrid{grid-template-columns:1fr}.top{display:block}.meta{text-align:left;margin-top:15px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top"><div><h1 class="title">FinScope</h1><p class="sub">Piyasa paneli — döviz, kıymetli maden, BIST ve fon görünümü. <b>v0.7</b></p></div><div><button class="btn" onclick="loadData()">Yenile</button><div class="meta" id="meta">Hazırlanıyor...</div></div></div>
  <div class="grid" id="grid"></div>
  <div class="panels"><div class="panel"><h2>AI Analist</h2><div id="ai">Veriler hazırlanıyor...</div><div class="chips"><span>Şeffaf veri</span><span>Demo veri yok</span><span>Tıklanabilir kart</span></div></div><div class="panel"><h2>Piyasa Radarı</h2><div id="radar">Piyasa radarı hazırlanıyor...</div></div></div>
</div>
<div class="modalBack" id="modalBack" onclick="if(event.target.id==='modalBack') closeModal()"><div class="modal"><div class="modalTop"><h2 id="mTitle">Detay</h2><button class="close" onclick="closeModal()">Kapat</button></div><div class="detailGrid"><div class="box"><small>Kategori</small><b id="mCat"></b></div><div class="box"><small>Veri durumu</small><b id="mStatus"></b></div><div class="box"><small>Son değer</small><b id="mVal"></b></div><div class="box"><small>Veri kaynağı</small><b id="mSource"></b></div></div><div class="warn" id="mNote"></div></div></div>
<script>
const fmtTR=new Intl.NumberFormat('tr-TR',{maximumFractionDigits:2});
let assets=[];
const base=[
 {id:'USDTRY',name:'USD / TRY',cat:'Döviz',unit:'₺',dec:2,live:true,source:'open.er-api.com'},
 {id:'EURTRY',name:'EUR / TRY',cat:'Döviz',unit:'₺',dec:2,live:true,source:'open.er-api.com'},
 {id:'GBPTRY',name:'GBP / TRY',cat:'Döviz',unit:'₺',dec:2,live:true,source:'open.er-api.com'},
 {id:'EURUSD',name:'EUR / USD',cat:'Parite',unit:'',dec:4,live:true,source:'open.er-api.com'},
 {id:'GBPUSD',name:'GBP / USD',cat:'Parite',unit:'',dec:4,live:true,source:'open.er-api.com'},
 {id:'XAU',name:'Altın Ons',cat:'Kıymetli maden',unit:'$',dec:2,live:false,source:'—'},
 {id:'XAG',name:'Gümüş Ons',cat:'Kıymetli maden',unit:'$',dec:2,live:false,source:'—'},
 {id:'XU100',name:'BIST 100',cat:'BIST',unit:'',dec:0,live:false,source:'—'},
 {id:'XU50',name:'BIST 50',cat:'BIST',unit:'',dec:0,live:false,source:'—'},
 {id:'XU30',name:'BIST 30',cat:'BIST',unit:'',dec:0,live:false,source:'—'},
 {id:'PBR',name:'PBR',cat:'TEFAS fonu',unit:'',dec:4,live:false,source:'—'},
 {id:'PHE',name:'PHE',cat:'TEFAS fonu',unit:'',dec:4,live:false,source:'—'},
 {id:'TLY',name:'TLY',cat:'TEFAS fonu',unit:'',dec:4,live:false,source:'—'}
];
function formatVal(a){return a.value==null?'—':`${fmtTR.format(Number(a.value).toFixed(a.dec))}${a.unit? ' '+a.unit:''}`}
function render(){document.getElementById('grid').innerHTML=assets.map((a,i)=>`<div class="card" onclick="openModal(${i})"><div class="name">${a.name}</div><div class="value">${formatVal(a)}</div><div class="chg ${a.change>0?'pos':a.change<0?'neg':'muted'}">${a.value==null?'veri yok':(a.change>=0?'▲':'▼')+' '+Math.abs(a.change).toFixed(2)+'%'}</div><div class="source">${a.status} • ${a.source}</div><div class="spark"></div></div>`).join('');
 const live=assets.filter(a=>a.value!=null).length; document.getElementById('meta').innerHTML=`Son güncelleme: ${new Date().toLocaleString('tr-TR')}<br>Canlı/geçerli kalem: ${live}/${assets.length}`;
 const usd=assets.find(a=>a.id==='USDTRY'); const bist=assets.find(a=>a.id==='XU100');
 document.getElementById('ai').textContent= usd?.value?`USD/TRY ${fmtTR.format(usd.value)} seviyesinde. Canlı veri yalnızca başarıyla alınan kaynaklarda gösterilir; alınamayan kalemlerde demo rakam kullanılmaz.`:'Döviz verisi alınamadı. Sistem yanlış/yedek değer göstermiyor.';
 document.getElementById('radar').textContent=`Piyasa radarı şeffaf modda. Canlı bağlantısı olmayan BIST, emtia ve TEFAS kalemlerinde gerçek dışı değer gösterilmiyor.`;}
async function loadData(){assets=base.map(a=>({...a,value:null,change:0,status:a.live?'yükleniyor':'canlı bağlantı yok'}));render();try{const r=await fetch('https://open.er-api.com/v6/latest/USD',{cache:'no-store'});const j=await r.json();const rates=j.rates||{};const tryr=rates.TRY, eur=rates.EUR, gbp=rates.GBP;if(tryr){set('USDTRY',tryr,'canlı'); if(eur)set('EURTRY',tryr/eur,'canlı'); if(gbp)set('GBPTRY',tryr/gbp,'canlı'); if(eur)set('EURUSD',1/eur,'canlı'); if(gbp)set('GBPUSD',1/gbp,'canlı');}}catch(e){console.log(e)} render();}
function set(id,val,status){const a=assets.find(x=>x.id===id); if(a){a.value=val; a.status=status; a.change=0;}}
function openModal(i){const a=assets[i];document.getElementById('mTitle').textContent=a.name+' Detay';document.getElementById('mCat').textContent=a.cat;document.getElementById('mStatus').textContent=a.status;document.getElementById('mVal').textContent=formatVal(a);document.getElementById('mSource').textContent=a.source;document.getElementById('mNote').textContent=a.value==null?'Bu kalem için güvenilir canlı veri bağlantısı henüz eklenmediği için değer gösterilmiyor. Yanlış/yedek veri kullanılmaz.':'Bu kalem canlı kaynaktan alınmıştır. Geçmiş performans ve grafikler sonraki sürümde eklenecek.';document.getElementById('modalBack').style.display='flex';}
function closeModal(){document.getElementById('modalBack').style.display='none'}
loadData();
</script>
</body>
</html>
