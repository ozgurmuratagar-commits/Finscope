<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FinScope</title>
  <style>
    :root { --bg:#071521; --panel:rgba(255,255,255,.10); --panel2:rgba(255,255,255,.15); --stroke:rgba(255,255,255,.24); --text:#f4fbff; --muted:rgba(244,251,255,.72); --good:#88f7bb; --bad:#ff8b9a; --warn:#ffd880; --blue:#a5dbff; }
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:Inter,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 80% 0%,#2f7b65 0,#11364c 34%,#071521 100%);}
    .wrap{max-width:1120px;margin:0 auto;padding:42px 22px 80px}.top{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:30px}.title{font-size:38px;font-weight:800;letter-spacing:-1.2px}.sub{font-size:15px;color:var(--muted);font-weight:700;margin-top:8px}.ver{color:#d6ecff}.right{text-align:right}.btn{border:0;border-radius:16px;padding:14px 24px;color:white;font-weight:800;background:linear-gradient(135deg,#8ee7ff,#68a9ff);box-shadow:0 12px 35px rgba(99,187,255,.35);cursor:pointer}.meta{margin-top:12px;font-size:13px;color:var(--muted);font-weight:700;line-height:1.5}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{min-height:155px;background:var(--panel);border:1px solid var(--stroke);border-radius:20px;padding:19px;box-shadow:0 18px 45px rgba(0,0,0,.18);cursor:pointer;transition:.18s transform,.18s background}.card:hover{transform:translateY(-2px);background:var(--panel2)}.name{font-size:14px;font-weight:900}.value{font-size:32px;line-height:1.1;margin:15px 0 8px;font-weight:900;letter-spacing:-.8px}.status{font-size:13px;font-weight:900;color:var(--good)}.status.empty{color:var(--warn)}.source{font-size:11px;color:var(--muted);font-weight:800;margin-top:9px}.spark{height:38px;margin-top:18px;border-radius:10px;background:linear-gradient(90deg,rgba(255,255,255,.13),rgba(255,255,255,.05));position:relative;overflow:hidden}.spark:before{content:"";position:absolute;left:12px;right:12px;bottom:10px;height:4px;border-radius:99px;background:linear-gradient(90deg,#eaffff,#9fffb6);transform:skewY(-6deg)}.panels{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-top:18px}.box{background:var(--panel);border:1px solid var(--stroke);border-radius:20px;padding:22px;box-shadow:0 18px 45px rgba(0,0,0,.18)}.box h2{margin:0 0 12px;font-size:22px}.box p{margin:0;color:var(--muted);font-weight:700;line-height:1.55}.modalBg{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;z-index:10}.modal{width:min(720px,100%);background:linear-gradient(145deg,rgba(80,150,185,.95),rgba(28,74,98,.95));border:1px solid rgba(255,255,255,.42);border-radius:24px;padding:28px;box-shadow:0 25px 80px rgba(0,0,0,.45)}.modalHead{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}.close{background:transparent;border:1px solid rgba(255,255,255,.6);color:white;border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer}.detailGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px}.detail{background:rgba(255,255,255,.14);border-radius:14px;padding:14px}.detail small{display:block;color:rgba(255,255,255,.72);font-weight:800}.detail b{display:block;font-size:18px;margin-top:4px}.note{margin-top:18px;color:#fff0b6;font-weight:800}@media(max-width:850px){.grid,.panels{grid-template-columns:1fr}.top{display:block}.right{text-align:left;margin-top:18px}.value{font-size:29px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div><div class="title">FinScope</div><div class="sub">Piyasa paneli — döviz, kıymetli maden, BIST ve fon görünümü. <span class="ver">v0.8</span></div></div>
      <div class="right"><button class="btn" onclick="loadMarket()">Yenile</button><div class="meta" id="meta">Veri hazırlanıyor...</div></div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="panels">
      <div class="box"><h2>AI Analist</h2><p id="ai">Veriler yükleniyor...</p></div>
      <div class="box"><h2>Piyasa Radarı</h2><p id="radar">Piyasa radarı hazırlanıyor...</p></div>
    </div>
  </div>
  <div class="modalBg" id="modalBg" onclick="if(event.target.id==='modalBg')closeModal()"><div class="modal"><div class="modalHead"><h2 id="mTitle">Detay</h2><button class="close" onclick="closeModal()">Kapat</button></div><div class="detailGrid" id="mGrid"></div><div class="note" id="mNote"></div></div></div>
  <script>
    let currentAssets=[];
    function fmtDate(iso){try{return new Date(iso).toLocaleString('tr-TR')}catch{return '—'}}
    function fmtVal(a){ if(a.value===null||a.value===undefined) return '—'; const v=Number(a.value); if(a.label.includes('/ USD')) return v.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:4}); if(a.category==='Döviz') return v.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺'; if(a.currency==='$') return v.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' $'; return v.toLocaleString('tr-TR',{maximumFractionDigits:2}); }
    function render(data){ currentAssets=data.assets||[]; document.getElementById('meta').innerHTML=`Son güncelleme: ${fmtDate(data.updatedAt)}<br>Canlı/geçerli kalem: ${data.liveCount}/${data.totalCount}`; const grid=document.getElementById('grid'); grid.innerHTML=''; currentAssets.forEach((a,i)=>{ const empty=a.value===null||a.value===undefined; const card=document.createElement('div'); card.className='card'; card.onclick=()=>openModal(i); card.innerHTML=`<div class="name">${a.label}</div><div class="value">${fmtVal(a)}</div><div class="status ${empty?'empty':''}">${empty?'veri yok':a.status}</div><div class="source">${a.source}</div><div class="spark"></div>`; grid.appendChild(card); }); buildText(); }
    function buildText(){ const live=currentAssets.filter(a=>a.value!==null); const fx=live.filter(a=>a.category==='Döviz'||a.category==='Parite').length; const missing=currentAssets.length-live.length; document.getElementById('ai').textContent = live.length ? `Şu anda ${live.length} kalemde veri alınabiliyor. Döviz/parite tarafında ${fx} canlı kalem var. Veri alınamayan kalemlerde yanlış değer gösterilmiyor; sistem güvenli modda çalışıyor.` : 'Canlı veri alınamadı. Sistem yanlış veri göstermemek için değerleri boş bıraktı.'; document.getElementById('radar').textContent = missing ? `${missing} kalemde veri bağlantısı yok. Öncelik: altın/gümüş, BIST ve TEFAS veri motorlarının güçlendirilmesi.` : 'Tüm kalemlerde veri alınabiliyor.'; }
    function openModal(i){ const a=currentAssets[i]; document.getElementById('mTitle').textContent=a.label+' Detay'; document.getElementById('mGrid').innerHTML=`<div class="detail"><small>Kategori</small><b>${a.category}</b></div><div class="detail"><small>Veri durumu</small><b>${a.status}</b></div><div class="detail"><small>Son değer</small><b>${fmtVal(a)}</b></div><div class="detail"><small>Veri kaynağı</small><b>${a.source}</b></div><div class="detail"><small>Güncelleme</small><b>${fmtDate(a.updatedAt)}</b></div><div class="detail"><small>Para birimi</small><b>${a.currency||'—'}</b></div>`; document.getElementById('mNote').textContent=a.note||'Bu detay penceresi sonraki sürümlerde grafik ve geçmiş performansla genişletilecek.'; document.getElementById('modalBg').style.display='flex'; }
    function closeModal(){document.getElementById('modalBg').style.display='none'}
    async function loadMarket(){ document.getElementById('meta').textContent='Veri hazırlanıyor...'; try{ const res=await fetch('/api/market?ts='+Date.now(),{cache:'no-store'}); if(!res.ok) throw new Error('API yanıt vermedi'); render(await res.json()); } catch(e){ document.getElementById('meta').textContent='Veri alınamadı'; document.getElementById('ai').textContent='API bağlantısı kurulamadı. Yanlış veri gösterilmiyor.'; document.getElementById('radar').textContent='Market Engine bağlantısı kontrol edilmeli.'; } }
    loadMarket();
  </script>
</body>
</html>
