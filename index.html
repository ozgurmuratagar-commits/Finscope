<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FinScope</title>
  <style>
    :root{--bg:#071827;--card:rgba(255,255,255,.085);--line:rgba(255,255,255,.18);--text:#f2f8ff;--muted:#b9c8d8;--green:#8affc1;--red:#ff8da0;--blue:#8ed8ff;--amber:#ffd27a}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 80% 10%,#2c7b73 0,#0d3a47 32%,#071827 100%);color:var(--text);font-family:Arial,Helvetica,sans-serif;min-height:100vh}.wrap{max-width:1180px;margin:0 auto;padding:42px 20px 64px}.top{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:30px}.brand h1{font-size:34px;margin:0 0 8px;font-weight:800}.brand p{margin:0;color:var(--text);opacity:.92;font-size:15px}.actions{text-align:right}.btn{border:0;border-radius:14px;background:linear-gradient(180deg,#9ce9ff,#58b9ee);color:#fff;font-weight:800;padding:13px 21px;box-shadow:0 0 24px rgba(111,212,255,.5);cursor:pointer}.meta{font-size:12px;line-height:1.7;color:var(--text);margin-top:10px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;min-height:146px;box-shadow:0 12px 34px rgba(0,0,0,.16);cursor:pointer;transition:.18s}.card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.36);background:rgba(255,255,255,.12)}.card.active{outline:2px solid rgba(142,216,255,.65)}.label{font-size:13px;font-weight:800;opacity:.95}.value{font-size:31px;font-weight:900;margin:11px 0 6px;letter-spacing:-1px}.change{font-size:13px;font-weight:800}.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--muted)}.source{font-size:11px;color:var(--muted);margin-top:8px}.spark{height:36px;border-radius:10px;background:rgba(142,216,255,.12);margin-top:13px;position:relative;overflow:hidden}.spark:before{content:"";position:absolute;left:7%;right:6%;top:50%;height:3px;background:linear-gradient(90deg,#c8ffff,#b7ff9c);transform:rotate(-5deg);border-radius:99px}.panels{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-top:18px}.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;min-height:132px}.panel h2{margin:0 0 14px;font-size:20px}.panel p{margin:0;line-height:1.6}.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.tag{border:1px solid rgba(255,255,255,.24);border-radius:99px;padding:6px 10px;font-size:11px;color:#fff;background:rgba(255,255,255,.08)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.52);display:none;align-items:center;justify-content:center;padding:20px;z-index:10}.modal.show{display:flex}.modal-card{max-width:560px;width:100%;background:#102939;border:1px solid rgba(255,255,255,.2);border-radius:22px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.45)}.modal-head{display:flex;justify-content:space-between;gap:10px}.close{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:10px;padding:8px 11px;cursor:pointer}.detail-row{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.12);padding:10px 0;color:var(--muted)}.detail-row strong{color:var(--text)}.warning{color:var(--amber);font-size:13px;margin-top:12px}@media(max-width:850px){.grid,.panels{grid-template-columns:1fr}.top{display:block}.actions{text-align:left;margin-top:18px}.value{font-size:28px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand"><h1>FinScope</h1><p>Piyasa paneli — döviz, kıymetli maden, BIST ve fon görünümü.</p></div>
      <div class="actions"><button class="btn" onclick="loadData()">Yenile</button><div class="meta" id="meta">Veri hazırlanıyor...</div></div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="panels">
      <div class="panel"><h2>AI Analist</h2><p id="ai">Veriler yükleniyor...</p><div class="tags" id="tags"></div></div>
      <div class="panel"><h2>Piyasa Radarı</h2><p id="radar">Piyasa radarı hazırlanıyor...</p></div>
    </div>
  </div>
  <div class="modal" id="modal" onclick="if(event.target.id==='modal') closeModal()"><div class="modal-card"><div class="modal-head"><h2 id="mTitle">Detay</h2><button class="close" onclick="closeModal()">Kapat</button></div><div id="mBody"></div></div></div>
<script>
const fallbackAssets=[
 {symbol:'USDTRY',title:'USD / TRY',value:null,unit:'₺',changePct:null,category:'Döviz',status:'unavailable',source:'API'},
 {symbol:'EURTRY',title:'EUR / TRY',value:null,unit:'₺',changePct:null,category:'Döviz',status:'unavailable',source:'API'},
 {symbol:'GBPTRY',title:'GBP / TRY',value:null,unit:'₺',changePct:null,category:'Döviz',status:'unavailable',source:'API'},
 {symbol:'EURUSD',title:'EUR / USD',value:null,unit:'',changePct:null,category:'Parite',status:'unavailable',source:'API'},
 {symbol:'GBPUSD',title:'GBP / USD',value:null,unit:'',changePct:null,category:'Parite',status:'unavailable',source:'API'},
 {symbol:'GOLD',title:'Altın Ons',value:null,unit:'$',changePct:null,category:'Kıymetli Maden',status:'unavailable',source:'Yahoo Finance'},
 {symbol:'SILVER',title:'Gümüş Ons',value:null,unit:'$',changePct:null,category:'Kıymetli Maden',status:'unavailable',source:'Yahoo Finance'},
 {symbol:'XU100',title:'BIST 100',value:null,unit:'',changePct:null,category:'Endeks',status:'unavailable',source:'Yahoo Finance'},
 {symbol:'XU50',title:'BIST 50',value:null,unit:'',changePct:null,category:'Endeks',status:'unavailable',source:'Yahoo Finance'},
 {symbol:'XU30',title:'BIST 30',value:null,unit:'',changePct:null,category:'Endeks',status:'unavailable',source:'Yahoo Finance'},
 {symbol:'PBR',title:'PBR',value:null,unit:'',changePct:null,category:'TEFAS Fon',status:'not_connected',source:'TEFAS bağlantısı yok'},
 {symbol:'PHE',title:'PHE',value:null,unit:'',changePct:null,category:'TEFAS Fon',status:'not_connected',source:'TEFAS bağlantısı yok'},
 {symbol:'TLY',title:'TLY',value:null,unit:'',changePct:null,category:'TEFAS Fon',status:'not_connected',source:'TEFAS bağlantısı yok'}
];
let assets=[];
function fmt(v, unit){ if(v===null||v===undefined||!Number.isFinite(Number(v))) return '—'; const n=Number(v); const d=Math.abs(n)>=100 ? 2 : 4; return n.toLocaleString('tr-TR',{minimumFractionDigits:d>2?4:2,maximumFractionDigits:d})+(unit?' '+unit:''); }
function statusText(s){return {live:'canlı',delayed:'gecikmeli',unavailable:'veri alınamadı',not_connected:'canlı bağlantı yok'}[s]||s}
function render(data){assets=data.assets||fallbackAssets; const grid=document.getElementById('grid'); grid.innerHTML=''; assets.forEach(a=>{const ch=a.changePct; const cls=ch>0?'pos':ch<0?'neg':'neu'; const c=document.createElement('div'); c.className='card'; c.onclick=()=>openModal(a); c.innerHTML=`<div class="label">${a.title}</div><div class="value">${fmt(a.value,a.unit)}</div><div class="change ${cls}">${ch===null?'• değişim yok':(ch>0?'▲ ':'▼ ')+ch.toFixed(2)+'%'}</div><div class="source">${statusText(a.status)} • ${a.source}</div><div class="spark"></div>`; grid.appendChild(c)}); const dt=new Date(data.updatedAt||Date.now()); document.getElementById('meta').innerHTML=`Son güncelleme: ${dt.toLocaleDateString('tr-TR')} ${dt.toLocaleTimeString('tr-TR')}<br>Canlı/veri alınan kalem: ${assets.filter(a=>a.status==='live').length}/${assets.length}`; updateAnalysis(); }
function updateAnalysis(){const live=assets.filter(a=>a.status==='live'); const missing=assets.filter(a=>a.status!=='live'); const usd=assets.find(a=>a.symbol==='USDTRY'); const bist=assets.find(a=>a.symbol==='XU100'); const gold=assets.find(a=>a.symbol==='GOLD'); let txt=[]; if(usd?.value) txt.push(`USD/TRY ${fmt(usd.value,'₺')} seviyesinde.`); else txt.push('USD/TRY verisi alınamadı.'); if(gold?.value) txt.push(`Altın ons ${fmt(gold.value,'$')} seviyesinde.`); else txt.push('Altın verisi şu an alınamadı; yanlış veri gösterilmiyor.'); if(bist?.value) txt.push(`BIST 100 ${fmt(bist.value,'')} seviyesinde.`); else txt.push('BIST 100 verisi şu an alınamadı; yanlış veri gösterilmiyor.'); document.getElementById('ai').textContent=txt.join(' '); document.getElementById('tags').innerHTML=[`Canlı: ${live.length}`,`Eksik: ${missing.length}`,`TEFAS: sonraki sürüm`].map(t=>`<span class="tag">${t}</span>`).join(''); document.getElementById('radar').textContent = live.length>=5 ? 'Piyasa radarı temel verilerle çalışıyor. Eksik kalan kaynaklar yanlış veri yerine açıkça işaretleniyor.' : 'Bazı veri kaynakları cevap vermedi. FinScope yanlış veri göstermek yerine eksik veriyi işaretliyor.'; }
async function loadData(){document.getElementById('meta').textContent='Veri hazırlanıyor...'; try{const res=await fetch('/api/market?ts='+Date.now(),{cache:'no-store'}); if(!res.ok) throw new Error('API '+res.status); const data=await res.json(); render(data);}catch(e){console.error(e); render({updatedAt:new Date().toISOString(),assets:fallbackAssets}); document.getElementById('meta').innerHTML='API bağlantısı kurulamadı.<br>Yanlış veri gösterilmiyor.';}}
function openModal(a){document.getElementById('mTitle').textContent=a.title; document.getElementById('mBody').innerHTML=`<div class="detail-row"><span>Kategori</span><strong>${a.category}</strong></div><div class="detail-row"><span>Değer</span><strong>${fmt(a.value,a.unit)}</strong></div><div class="detail-row"><span>Değişim</span><strong>${a.changePct===null?'Yok':a.changePct.toFixed(2)+'%'}</strong></div><div class="detail-row"><span>Durum</span><strong>${statusText(a.status)}</strong></div><div class="detail-row"><span>Kaynak</span><strong>${a.source}</strong></div><p class="warning">${a.status==='not_connected'?'Bu varlık için canlı bağlantı henüz eklenmedi. Yanlış veri gösterilmez.':a.status==='unavailable'?'Kaynak cevap vermediği için değer boş bırakıldı.':'Bu kart tıklanabilir detay panelidir.'}</p>`; document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
loadData(); setInterval(loadData,60000);
</script>
</body>
</html>
