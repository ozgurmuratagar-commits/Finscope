<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinScope</title>
  <style>
    :root{--bg1:#071322;--bg2:#133f46;--card:rgba(255,255,255,.105);--border:rgba(255,255,255,.22);--text:#f4fbff;--muted:#b8c9d0;--green:#80f5b0;--red:#ff7e91;--blue:#8bd8ff;}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top right,#2d776f 0,#103441 38%,#071322 100%);color:var(--text);min-height:100vh}.wrap{width:min(1050px,92vw);margin:0 auto;padding:44px 0 70px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:24px}.brand h1{font-size:34px;margin:0 0 6px;font-weight:800;letter-spacing:-.04em}.brand p{margin:0;color:var(--text);opacity:.88;font-weight:650}.actions{text-align:right}.btn{border:0;background:linear-gradient(180deg,#9ff3ff,#60bcff);color:white;font-weight:800;border-radius:14px;padding:13px 21px;box-shadow:0 10px 30px rgba(90,190,255,.35);cursor:pointer}.stamp{margin-top:10px;font-size:12px;color:var(--text);font-weight:700}.meta{font-size:12px;color:var(--muted);margin-top:4px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:30px}.card,.panel{background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.075));border:1px solid var(--border);border-radius:18px;box-shadow:0 18px 55px rgba(0,0,0,.22);backdrop-filter:blur(14px)}.card{padding:18px;min-height:150px;cursor:pointer;transition:.18s}.card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.46)}.label{font-size:13px;font-weight:800;margin-bottom:10px}.value{font-size:31px;font-weight:900;letter-spacing:-.04em}.change{margin-top:8px;font-size:13px;font-weight:850}.pos{color:var(--green)}.neg{color:var(--red)}.src{margin-top:8px;font-size:11px;color:var(--muted)}.spark{height:36px;border-radius:10px;background:rgba(134,242,220,.16);margin-top:14px;position:relative;overflow:hidden}.spark:after{content:"";position:absolute;left:12px;right:12px;bottom:10px;height:4px;border-radius:8px;background:linear-gradient(90deg,#9cf7ff,#a4ffbb);transform:skewY(-6deg)}.panels{display:grid;grid-template-columns:1.2fr .8fr;gap:14px;margin-top:18px}.panel{padding:20px}.panel h2{margin:0 0 14px;font-size:20px}.panel p{line-height:1.55;margin:0;color:var(--text);font-weight:650}.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.chip{font-size:11px;font-weight:800;border:1px solid var(--border);border-radius:999px;padding:7px 10px;background:rgba(255,255,255,.09)}.detail{margin-top:18px;display:none}.detail.show{display:block}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.small{font-size:12px;color:var(--muted);font-weight:650}.warn{margin-top:10px;color:#ffe3a5;font-size:12px}.footer{margin-top:16px;color:var(--muted);font-size:12px}@media(max-width:850px){.grid,.panels,.detail-grid{grid-template-columns:1fr}.top{display:block}.actions{text-align:left;margin-top:18px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <div class="brand"><h1>FinScope</h1><p>Piyasa paneli — döviz, kıymetli maden, BIST ve fon görünümü.</p></div>
      <div class="actions"><button class="btn" onclick="loadMarket()">Yenile</button><div class="stamp" id="stamp">Veri hazırlanıyor...</div><div class="meta" id="meta"></div></div>
    </section>
    <section class="grid" id="cards"></section>
    <section class="panels"><div class="panel"><h2>AI Analist</h2><p id="ai">Veriler yükleniyor...</p><div class="chips" id="chips"></div></div><div class="panel"><h2>Piyasa Radarı</h2><p id="radar">Piyasa radarı hazırlanıyor...</p><div class="warn" id="notes"></div></div></section>
    <section class="detail panel" id="detail"><h2 id="detailTitle">Detay</h2><div class="detail-grid"><div><div class="small">Kategori</div><p id="detailCat"></p></div><div><div class="small">Veri kaynağı</div><p id="detailSource"></p></div><div><div class="small">Durum</div><p id="detailStatus"></p></div><div><div class="small">Son değer</div><p id="detailValue"></p></div></div><p class="footer" id="detailText"></p></section>
  </main>
<script>
let latest = null;
function fmt(a){ if(a.value == null) return '—'; const v = Number(a.value); let s = v.toLocaleString('tr-TR',{maximumFractionDigits:a.symbol.includes('USD')&&!a.symbol.includes('TRY')?4:2}); return a.unit==='₺'?s+' ₺':a.unit==='$'?s+' $':s; }
function changeClass(v){ return Number(v)>=0?'pos':'neg'; }
function render(data){ latest=data; document.getElementById('stamp').textContent='Son güncelleme: '+(data.dateLabel||new Date().toLocaleString('tr-TR')); document.getElementById('meta').textContent=`Canlı/gecikmeli kalem: ${data.liveCount}/${data.assets.length}`; const cards=document.getElementById('cards'); cards.innerHTML=''; data.assets.forEach(a=>{ const el=document.createElement('article'); el.className='card'; el.onclick=()=>showDetail(a); el.innerHTML=`<div class="label">${a.label}</div><div class="value">${fmt(a)}</div><div class="change ${changeClass(a.change)}">${Number(a.change)>=0?'▲':'▼'} ${Number(a.change||0).toFixed(2)}%</div><div class="src">${a.status} • ${a.source}</div><div class="spark"></div>`; cards.appendChild(el); }); buildAI(data); }
function buildAI(data){ const by=s=>data.assets.find(a=>a.symbol===s); const usd=by('USDTRY'), gold=by('XAUUSD'), bist=by('XU100'); const text=`USD/TRY ${fmt(usd)} seviyesinde. Altın ons ${fmt(gold)} civarında. BIST 100 ${fmt(bist)} seviyesinde. Döviz tarafı ${usd.status}; BIST verisi ${bist.status}. TEFAS fonları bu sürümde sadece takip kartı olarak yer alıyor.`; document.getElementById('ai').textContent=text; document.getElementById('radar').textContent='Piyasa radarı: döviz ve kıymetli madenler izleniyor; BIST verisi gecikmeli/yedek olabilir. Kartlara tıklayarak detay panelini açabilirsin.'; document.getElementById('chips').innerHTML=['Döviz','BIST','Kıymetli maden','TEFAS takip'].map(x=>`<span class="chip">${x}</span>`).join(''); document.getElementById('notes').textContent=data.notes.join(' '); }
function showDetail(a){ document.getElementById('detail').classList.add('show'); document.getElementById('detailTitle').textContent=a.label+' Detay'; document.getElementById('detailCat').textContent=a.category; document.getElementById('detailSource').textContent=a.source; document.getElementById('detailStatus').textContent=a.status; document.getElementById('detailValue').textContent=fmt(a)+' / '+Number(a.change||0).toFixed(2)+'%'; document.getElementById('detailText').textContent=a.symbol+' için detay sayfası bu panelden başlayacak. Bir sonraki sürümde geçmiş performans ve grafikler eklenecek.'; window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}); }
async function loadMarket(){ document.getElementById('stamp').textContent='Veri yenileniyor...'; try{ const r=await fetch('/api/market?ts='+Date.now()); if(!r.ok) throw new Error('API '+r.status); const data=await r.json(); render(data);}catch(e){ document.getElementById('stamp').textContent='API hatası, yedek veri kullanılıyor'; render({dateLabel:new Date().toLocaleString('tr-TR'),liveCount:0,notes:['API yanıtı alınamadı.'],assets:[{symbol:'USDTRY',label:'USD / TRY',category:'Döviz',value:39.5,unit:'₺',change:0,source:'yedek',status:'yedek'},{symbol:'XAUUSD',label:'Altın Ons',category:'Kıymetli Maden',value:2456,unit:'$',change:0,source:'yedek',status:'yedek'},{symbol:'XU100',label:'BIST 100',category:'Endeks',value:10450,unit:'',change:0,source:'yedek',status:'yedek'}]});}}
loadMarket(); setInterval(loadMarket,60000);
</script>
</body>
</html>
