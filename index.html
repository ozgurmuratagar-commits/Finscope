<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FinScope</title>
<style>
:root{--bg:#061823;--card:rgba(255,255,255,.09);--line:rgba(255,255,255,.22);--text:#f5fbff;--muted:#bed0d6;--good:#85f5b7;--bad:#ff8a9a;--warn:#ffd77a;--blue:#95d9ff}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top right,#246b61 0,#083346 35%,#061823 100%);color:var(--text);min-height:100vh} .wrap{max-width:1120px;margin:0 auto;padding:42px 22px 70px}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:28px}.brand h1{margin:0;font-size:35px;letter-spacing:-1.2px}.brand p{margin:8px 0 0;font-weight:700;color:#e6f1f2}.version{font-size:14px;color:var(--warn);font-weight:800}.right{text-align:right}.btn{background:linear-gradient(180deg,#a8eeff,#67c6ff);border:0;border-radius:15px;color:white;font-weight:900;padding:14px 22px;box-shadow:0 10px 30px rgba(85,198,255,.38);cursor:pointer}.meta{margin-top:10px;font-size:13px;font-weight:700;color:#e7f7fa}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{border:1px solid var(--line);background:var(--card);border-radius:18px;padding:17px 18px;min-height:155px;box-shadow:0 16px 38px rgba(0,0,0,.22);cursor:pointer;transition:.18s}.card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.42);background:rgba(255,255,255,.13)}.name{font-weight:900;font-size:15px;margin-bottom:14px}.value{font-size:31px;font-weight:900;letter-spacing:-.8px}.empty{font-size:31px;font-weight:900;color:#fff}.status{font-size:13px;margin-top:9px;font-weight:900}.status.live{color:var(--good)}.status.none{color:var(--warn)}.src{margin-top:7px;font-size:12px;color:#e3eff1;font-weight:700}.spark{height:34px;border-radius:9px;background:rgba(149,217,255,.18);margin-top:14px;position:relative;overflow:hidden}.spark:after{content:"";position:absolute;left:8px;right:8px;top:19px;height:3px;border-radius:6px;background:linear-gradient(90deg,#efffff,#a7ffc8);transform:skewY(-7deg)}.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}.panel{border:1px solid var(--line);background:var(--card);border-radius:18px;padding:18px;box-shadow:0 16px 38px rgba(0,0,0,.20)}.panel h2{margin:0 0 12px;font-size:20px}.panel p{margin:0;color:#eef7f8;line-height:1.5;font-weight:700}.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.chip{border:1px solid rgba(255,255,255,.38);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;color:#fff}.modalBack{display:none;position:fixed;inset:0;background:rgba(0,0,0,.46);backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:20px;z-index:10}.modalBack.show{display:flex}.modal{width:min(720px,92vw);background:linear-gradient(135deg,rgba(73,148,184,.96),rgba(35,76,91,.98));border:1px solid rgba(255,255,255,.36);border-radius:22px;padding:26px;box-shadow:0 24px 80px rgba(0,0,0,.48)}.modalTop{display:flex;justify-content:space-between;gap:18px}.close{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.55);border-radius:13px;color:white;font-weight:900;padding:12px 14px;cursor:pointer}.detailGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px}.box{background:rgba(255,255,255,.13);border-radius:12px;padding:12px;font-weight:800}.label{font-size:12px;color:#dcecef;margin-bottom:4px}.note{margin-top:14px;color:#fff3bd;font-weight:900}@media(max-width:780px){.grid,.panels,.detailGrid{grid-template-columns:1fr}.top{display:block}.right{text-align:left;margin-top:18px}.brand h1{font-size:31px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><h1>FinScope</h1><p>Piyasa paneli — döviz, kıymetli maden, BIST ve fon görünümü. <span class="version">v0.9</span></p></div>
    <div class="right"><button class="btn" onclick="loadMarket()">Yenile</button><div class="meta" id="meta">Veri hazırlanıyor…</div></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="panels">
    <section class="panel"><h2>AI Analist</h2><p id="ai">Veriler hazırlanıyor…</p><div class="chips" id="chips"></div></section>
    <section class="panel"><h2>Piyasa Radarı</h2><p id="radar">Piyasa radarı hazırlanıyor…</p></section>
  </div>
</div>
<div class="modalBack" id="modalBack" onclick="if(event.target.id==='modalBack')closeModal()"><div class="modal"><div class="modalTop"><h2 id="mTitle">Detay</h2><button class="close" onclick="closeModal()">Kapat</button></div><div class="detailGrid"><div class="box"><div class="label">Kategori</div><div id="mCat"></div></div><div class="box"><div class="label">Veri durumu</div><div id="mStatus"></div></div><div class="box"><div class="label">Son değer</div><div id="mVal"></div></div><div class="box"><div class="label">Veri kaynağı</div><div id="mSrc"></div></div></div><div class="note" id="mNote"></div></div></div>
<script>
let ASSETS=[];
function fmt(n, suffix='') { if(n===null || n===undefined || Number.isNaN(Number(n))) return '—'; const x=Number(n); const d=Math.abs(x)<10?4:2; return x.toLocaleString('tr-TR',{minimumFractionDigits:d,maximumFractionDigits:d})+(suffix? ' '+suffix:''); }
function cls(a){return (a.status||'').includes('canlı')?'live':'none'}
function render(){ const grid=document.getElementById('grid'); grid.innerHTML=''; ASSETS.forEach((a,i)=>{const div=document.createElement('div');div.className='card';div.onclick=()=>openModal(a);div.innerHTML=`<div class="name">${a.title}</div><div class="${a.value==null?'empty':'value'}">${fmt(a.value,a.suffix)}</div><div class="status ${cls(a)}">${a.status||'veri yok'}</div><div class="src">${a.source||'—'}</div><div class="spark"></div>`;grid.appendChild(div);}); renderText();}
function renderText(){const live=ASSETS.filter(a=>String(a.status).includes('canlı')).length;const total=ASSETS.length; const usd=ASSETS.find(a=>a.id==='usdtry'); const bist=ASSETS.find(a=>a.id==='xu100'); const gold=ASSETS.find(a=>a.id==='gold'); document.getElementById('ai').textContent=`${live}/${total} kalemde veri alındı. Döviz tarafı canlı kaynak üzerinden geliyor. Veri alınamayan fon ve yerel piyasa kalemleri gerçek bağlantı kurulana kadar boş gösteriliyor.`; document.getElementById('radar').textContent=`Piyasa radarı: canlı döviz bağlantısı aktif. BIST, kıymetli maden ve TEFAS kalemlerinde kaynak durumu kartların içinde ayrı ayrı gösteriliyor.`; document.getElementById('chips').innerHTML=['Yanlış veri yok','Kaynak şeffaf','Detay pencere'].map(x=>`<span class="chip">${x}</span>`).join('');}
function openModal(a){document.getElementById('mTitle').textContent=a.title+' Detay';document.getElementById('mCat').textContent=a.category||'—';document.getElementById('mStatus').textContent=a.status||'veri yok';document.getElementById('mVal').textContent=fmt(a.value,a.suffix);document.getElementById('mSrc').textContent=(a.source||'—')+(a.symbol?' • '+a.symbol:'');document.getElementById('mNote').textContent=a.value==null?'Bu kalem için canlı veri bağlantısı henüz güvenilir şekilde kurulmadı; yanlış değer gösterilmez.':'Bu kalem canlı/gecikmeli kaynaktan alınmıştır. Geçmiş performans ve grafikler sonraki sürümde genişletilecek.';document.getElementById('modalBack').classList.add('show')}
function closeModal(){document.getElementById('modalBack').classList.remove('show')}
async function loadMarket(){document.getElementById('meta').textContent='Veri alınıyor…'; try{const r=await fetch('/api/market?ts='+Date.now()); const j=await r.json(); ASSETS=j.assets||[]; document.getElementById('meta').textContent='Son güncelleme: '+new Date(j.updatedAt||Date.now()).toLocaleString('tr-TR'); render();}catch(e){document.getElementById('meta').textContent='Veri alınamadı'; ASSETS=[]; render();}}
loadMarket();
</script>
</body>
</html>
