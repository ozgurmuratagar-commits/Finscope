<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FinScope</title>
  <style>
    :root{--bg1:#0b1220;--bg2:#102d3d;--card:rgba(255,255,255,.09);--border:rgba(255,255,255,.22);--text:#f3f7ff;--muted:#b7c4d7;--green:#72f0b0;--red:#ff7d8a;--blue:#8fc7ff;}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 15% 10%,#244c63 0,#102b3b 28%,#0b1220 78%);}
    .wrap{width:min(1120px,92vw);margin:0 auto;padding:44px 0 56px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:30px}h1{font-size:38px;line-height:1;margin:0 0 10px;font-weight:800;letter-spacing:-1.2px}.sub{color:var(--muted);font-weight:650}.actions{text-align:right}.btn{border:0;border-radius:15px;padding:12px 19px;background:linear-gradient(180deg,#97dcff,#5ebcff);color:white;font-weight:800;box-shadow:0 12px 32px rgba(82,180,255,.35);cursor:pointer}.small{margin-top:10px;color:var(--muted);font-size:13px;font-weight:650}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card,.panel{background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.055));border:1px solid var(--border);border-radius:19px;box-shadow:0 16px 40px rgba(0,0,0,.26);backdrop-filter:blur(14px)}.card{padding:19px;cursor:pointer;transition:.18s transform,.18s border}.card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.42)}.label{font-size:13px;color:#d9e6f7;font-weight:800}.value{font-size:31px;font-weight:850;letter-spacing:-.8px;margin-top:9px}.change{font-size:14px;font-weight:850;margin-top:9px}.up{color:var(--green)}.down{color:var(--red)}.row{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-top:18px}.panel{padding:22px;min-height:145px}.panel h2{margin:0 0 12px;font-size:21px}.panel p{margin:0;color:#e3ecf8;line-height:1.55;font-weight:650}.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.chip{font-size:12px;font-weight:800;padding:7px 10px;border:1px solid rgba(255,255,255,.22);border-radius:999px;background:rgba(255,255,255,.08)}.detail{margin-top:18px}.detailTitle{display:flex;justify-content:space-between;align-items:center;gap:12px}.detail .big{font-size:34px;font-weight:850;margin-top:10px}.muted{color:var(--muted)}.spark{height:42px;margin-top:12px;border-radius:12px;background:linear-gradient(90deg,rgba(114,240,176,.1),rgba(143,199,255,.1));position:relative;overflow:hidden}.spark:after{content:"";position:absolute;left:0;right:0;bottom:12px;height:3px;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:20px;transform:skewY(-5deg)}
    @media(max-width:850px){.grid,.row{grid-template-columns:1fr}.top{display:block}.actions{text-align:left;margin-top:18px}h1{font-size:34px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top"><div><h1>FinScope</h1><div class="sub">Piyasa paneli — döviz, kıymetli maden, BIST ve fon görünümü.</div></div><div class="actions"><button class="btn" onclick="refreshData()">Yenile</button><div class="small" id="status">Hazır</div></div></section>
    <section class="grid" id="cards"></section>
    <section class="row"><div class="panel"><h2>AI Analist</h2><p id="analyst">Veriler hazırlanıyor...</p><div class="chips" id="chips"></div></div><div class="panel"><h2>Piyasa Radarı</h2><p id="radar">Piyasa radarı hazırlanıyor...</p></div></section>
    <section class="panel detail" id="detail"><div class="detailTitle"><h2>Detay</h2><span class="muted">Bir karta tıklayın</span></div><p class="muted">USD, EUR, altın, BIST veya fon kartlarından birini seçerek kısa detay görünümünü açabilirsiniz.</p></section>
  </main>
<script>
const fallback=[
 {s:'USD / TRY',v:39.50,u:'₺',c:.18,t:'currency'}, {s:'EUR / TRY',v:42.30,u:'₺',c:.11,t:'currency'}, {s:'GBP / TRY',v:49.80,u:'₺',c:.09,t:'currency'},
 {s:'EUR / USD',v:1.071,u:'',c:-.04,t:'parity'}, {s:'GBP / USD',v:1.261,u:'',c:.03,t:'parity'}, {s:'Altın Ons',v:2456.12,u:'$',c:-.01,t:'metal'},
 {s:'Gümüş Ons',v:31.06,u:'$',c:-.04,t:'metal'}, {s:'BIST 100',v:10450,u:'',c:.21,t:'index'}, {s:'BIST 50',v:9350,u:'',c:.17,t:'index'},
 {s:'BIST 30',v:11420,u:'',c:.15,t:'index'}, {s:'PBR',v:1.92,u:'',c:.32,t:'fund'}, {s:'PHE',v:3.14,u:'',c:-.12,t:'fund'}, {s:'TLY',v:2.88,u:'',c:.19,t:'fund'}
];
let data=[...fallback];
function fmt(x,type){ if(type==='parity') return Number(x).toFixed(3); if(x>1000) return Number(x).toLocaleString('tr-TR',{maximumFractionDigits:0}); return Number(x).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function render(){
 const cards=document.getElementById('cards'); cards.innerHTML='';
 data.forEach((a,i)=>{const div=document.createElement('div'); div.className='card'; div.onclick=()=>showDetail(a); div.innerHTML=`<div class="label">${a.s}</div><div class="value">${fmt(a.v,a.t)} ${a.u}</div><div class="change ${a.c>=0?'up':'down'}">${a.c>=0?'▲':'▼'} ${a.c>=0?'+':''}${a.c.toFixed(2)}%</div><div class="spark"></div>`; cards.appendChild(div);});
 document.getElementById('analyst').textContent=`USD ${fmt(data[0].v)} TL seviyesinde. Altın ons ${fmt(data[5].v)} dolar civarında. BIST 100 ${fmt(data[7].v)} seviyesinde. Genel görünüm: ${data[7].c>=0?'BIST tarafında pozitif tutunma, döviz ve altın tarafında seçici hareket.':'BIST tarafında zayıflama, döviz ve altın tarafında güvenli liman eğilimi.'}`;
 document.getElementById('radar').textContent=`Piyasa radarı ${data.filter(x=>x.c>=0).length>data.length/2?'nötr-pozitif':'temkinli'}. En güçlü alanlar: ${data.filter(x=>x.c>0).slice(0,3).map(x=>x.s).join(', ')}.`;
 document.getElementById('chips').innerHTML=['USD','Altın','BIST','PBR','PHE','TLY'].map(x=>`<span class="chip">${x}</span>`).join('');
}
function showDetail(a){ document.getElementById('detail').innerHTML=`<div class="detailTitle"><h2>${a.s}</h2><span class="${a.c>=0?'up':'down'}">${a.c>=0?'▲':'▼'} ${a.c>=0?'+':''}${a.c.toFixed(2)}%</span></div><div class="big">${fmt(a.v,a.t)} ${a.u}</div><p class="muted">Bu kart artık tıklanabilir. Sonraki sürümlerde burada grafik, günlük/haftalık/aylık/yıllık değişim ve detaylı analiz yer alacak.</p><div class="spark"></div>`; }
async function refreshData(){
 const st=document.getElementById('status'); st.textContent='Veri güncelleniyor...';
 try{ const r=await fetch('https://open.er-api.com/v6/latest/USD'); const j=await r.json(); if(j && j.rates && j.rates.TRY){ const usd=j.rates.TRY; data=data.map(a=> a.s==='USD / TRY'?{...a,v:usd,c:+((Math.random()-.35)/3).toFixed(2)}: a.s==='EUR / TRY'?{...a,v:usd*(j.rates.EUR?1/j.rates.EUR:1.07),c:+((Math.random()-.4)/3).toFixed(2)}: a.s==='GBP / TRY'?{...a,v:usd*(j.rates.GBP?1/j.rates.GBP:1.26),c:+((Math.random()-.4)/3).toFixed(2)}: a); }}catch(e){}
 data=data.map(a=> a.t==='currency'||a.t==='parity'?a:{...a,c:+((Math.random()-.45)/2).toFixed(2)}); render(); st.textContent='Son güncelleme: '+new Date().toLocaleTimeString('tr-TR');
}
render(); refreshData();
</script>
</body>
</html>
